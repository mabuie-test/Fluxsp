<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>DeviceMgr - Recuperar senha</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="matrix">
  <div class="auth-wrap">
    <div class="card">
      <div class="auth-title">
        <span class="brand">DEVICE.MGR</span>
        <span class="pill">RECOVERY</span>
      </div>
      <h2>Recuperar palavra-passe</h2>
      <p class="small">Vamos enviar um link de reposição para o teu email.</p>

      <label>Email da conta</label>
      <input id="email" type="email" placeholder="teu@email.com" />
      <div class="row" style="margin-top:12px">
        <button id="btnSend">Enviar link</button>
        <a class="btn secondary" href="/login.html">Voltar ao login</a>
      </div>
      <p id="msg" class="notice" style="display:none"></p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('btnSend').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const msg = document.getElementById('msg');
      msg.style.display = 'none';

      const res = await apiFetch('/api/auth/forgot-password', { method:'POST', body:{ email } });
      msg.style.display = 'block';
      if (res.ok) {
        msg.innerText = 'Se o email existir, enviámos instruções de recuperação.';
      } else {
        msg.innerText = 'Erro: ' + (res.error || JSON.stringify(res));
      }
    });
  </script>
</body>
</html>
