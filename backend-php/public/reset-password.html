<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>DeviceMgr - Redefinir senha</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="matrix">
  <div class="auth-wrap">
    <div class="card">
      <div class="auth-title">
        <span class="brand">DEVICE.MGR</span>
        <span class="pill">RESET</span>
      </div>
      <h2>Definir nova palavra-passe</h2>
      <p class="small">Insere a nova senha para concluir a recuperação.</p>

      <label>Token de recuperação</label>
      <input id="token" type="text" placeholder="token" />
      <label>Nova senha</label>
      <input id="password" type="password" placeholder="********" />
      <div class="row" style="margin-top:12px">
        <button id="btnReset">Atualizar senha</button>
        <a class="btn secondary" href="/login.html">Voltar ao login</a>
      </div>
      <p id="msg" class="notice" style="display:none"></p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const tokenParam = new URLSearchParams(location.search).get('token') || '';
    if (tokenParam) document.getElementById('token').value = tokenParam;

    document.getElementById('btnReset').addEventListener('click', async () => {
      const token = document.getElementById('token').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');
      msg.style.display = 'none';

      const res = await apiFetch('/api/auth/reset-password', { method:'POST', body:{ token, password } });
      msg.style.display = 'block';
      if (res.ok) {
        msg.innerText = 'Senha atualizada com sucesso. Agora faz login.';
      } else {
        msg.innerText = 'Erro: ' + (res.error || JSON.stringify(res));
      }
    });
  </script>
</body>
</html>
