<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>DeviceMgr - Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="matrix">
  <div class="auth-wrap">
    <div class="card">
      <div class="auth-title">
        <span class="brand">DEVICE.MGR</span>
        <span class="pill">LOGIN</span>
      </div>
      <h2>Entrar na plataforma</h2>
      <p class="small">Acesso seguro ao painel operacional.</p>

      <label>Email</label>
      <input id="email" type="email" placeholder="teu@email.com" />
      <label>Palavra-passe</label>
      <input id="password" type="password" placeholder="********" />
      <div class="row" style="margin-top:12px">
        <button id="btnLogin">Entrar</button>
        <a class="btn secondary" href="/forgot-password.html">Recuperar senha</a>
      </div>
      <p id="loginMsg" class="notice" style="display:none"></p>
      <p class="small">Não tens conta? <a href="/register.html">Clica aqui para registar</a>.</p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('btnLogin').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('loginMsg');
      msg.style.display = 'none';

      const res = await apiFetch('/api/auth/login', { method:'POST', body: { email, password } });
      if (res.token) {
        localStorage.setItem('auth_token', res.token);
        localStorage.setItem('role', res.role);
        if (res.role === 'admin') location.href = '/admin/index.html';
        else location.href = '/user/dashboard.html';
      } else {
        msg.style.display = 'block';
        msg.innerText = 'Erro: ' + (res.error || JSON.stringify(res));
      }
    });
  </script>
</body>
</html>
