<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>DeviceMgr - Recuperar senha</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container auth-shell">
    <div class="card auth-card">
      <h1>Recuperar senha</h1>
      <p class="small">Informe seu email para receber instruções.</p>
      <input id="email" type="email" placeholder="Email" />
      <button id="btnForgot">Enviar</button>
      <p id="msg" class="small"></p>
      <p class="small"><a href="/login.html">Voltar para login</a></p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('btnForgot').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const res = await apiFetch('/api/auth/forgot-password', { method:'POST', body:{email} });
      document.getElementById('msg').innerText = res.message || 'Pedido processado.';
    });
  </script>
</body>
</html>
