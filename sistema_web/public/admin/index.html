<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Admin</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="container">
  <header style="display:flex;justify-content:space-between;align-items:center">
    <h1>Painel Administrativo</h1>
    <div><button id="refresh">Atualizar</button> <button id="logout">Logout</button></div>
  </header>

  <div class="grid">
    <div class="card"><h3>Resumo</h3><div id="summary">Carregando...</div></div>
    <div class="card"><h3>Subscrições a expirar</h3><ul id="expiring"></ul></div>
  </div>

  <div class="card">
    <h3>Aparelhos</h3>
    <table id="devices"><thead><tr><th>DeviceId</th><th>IMEI</th><th>Modelo</th><th>Dono</th><th>Online</th><th>Subscrição</th></tr></thead><tbody></tbody></table>
  </div>

  <div class="card">
    <h3>Pagamentos</h3>
    <table id="payments"><thead><tr><th>ID</th><th>User</th><th>Device</th><th>Montante</th><th>Método</th><th>Status</th><th>Ações</th></tr></thead><tbody></tbody></table>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
if (!localStorage.getItem('auth_token')) location.href='/';
document.getElementById('logout').addEventListener('click', ()=>{localStorage.clear();location.href='/';});

async function loadOverview(){
  const r = await apiFetch('/api/admin/overview', { method:'GET' });
  if (!r.ok) { document.getElementById('summary').innerText='Erro'; return; }
  const s = r.summary;
  document.getElementById('summary').innerHTML = `<div>Utilizadores: ${s.users}</div><div>Aparelhos: ${s.devices}</div><div>Online: ${s.onlineDevices}</div><div>Subscrições ativas: ${s.activeSubscriptions}</div><div>Receita (30d): ${s.monthlyRevenueMzn} MZN</div>`;
  const ul=document.getElementById('expiring'); ul.innerHTML='';
  r.expiringSoon.forEach(x=>{ const li=document.createElement('li'); li.textContent=`${x.device_id} (${x.model||'-'}) até ${new Date(x.subscription_until).toLocaleString()}`; ul.appendChild(li); });
}

async function loadDevices(){
  const r = await apiFetch('/api/devices', { method:'GET' });
  const tb=document.querySelector('#devices tbody'); tb.innerHTML='';
  if (!r.ok) return;
  r.devices.forEach(d=>{ const tr=document.createElement('tr'); tr.innerHTML=`<td>${d.deviceId}</td><td>${d.imei||'-'}</td><td>${d.model||'-'}</td><td>${d.ownerUserId||'-'}</td><td>${d.isOnline?'Online':'Offline'}</td><td>${d.subscriptionStatus} ${d.subscriptionUntil?('até '+new Date(d.subscriptionUntil).toLocaleDateString()):''}</td>`; tb.appendChild(tr); });
}

async function processPayment(id,action){
  const r=await apiFetch('/api/payments/'+id+'/process',{method:'POST',body:{action}});
  if(!r.ok) alert('Falha: '+(r.error||''));
  await loadPayments(); await loadOverview(); await loadDevices();
}

async function loadPayments(){
  const r = await apiFetch('/api/payments', { method:'GET' });
  const tb=document.querySelector('#payments tbody'); tb.innerHTML='';
  if (!r.ok) return;
  r.payments.forEach(p=>{ const tr=document.createElement('tr'); tr.innerHTML=`<td>${p.id}</td><td>${p.email||'-'}</td><td>${p.device_id||'-'}</td><td>${p.amount||'-'} ${p.currency||''}</td><td>${p.method||'-'}</td><td>${p.status}</td><td><button data-a="approve" data-id="${p.id}">Aprovar</button> <button data-a="reject" data-id="${p.id}">Rejeitar</button></td>`; tb.appendChild(tr); });
  tb.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>processPayment(b.dataset.id,b.dataset.a)));
}

async function loadAll(){ await loadOverview(); await loadDevices(); await loadPayments(); }
document.getElementById('refresh').addEventListener('click', loadAll);
loadAll();
</script>
</body>
</html>
