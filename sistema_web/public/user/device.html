<!doctype html>
<html>
<head>
  <meta charset="utf-8"/><title>Aparelho</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="container">
  <header style="display:flex;justify-content:space-between;align-items:center">
    <h1>Detalhes do aparelho</h1>
    <div><a href="/user/dashboard.html">Voltar</a> <button id="logout">Logout</button></div>
  </header>

  <div class="card" id="deviceInfo">Carregando...</div>
  <div class="card">
    <h3>Última telemetria</h3>
    <pre id="history" style="white-space:pre-wrap"></pre>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const deviceId = params.get('deviceId');
if (!deviceId) location.href='/user/dashboard.html';

document.getElementById('logout').addEventListener('click', ()=>{ localStorage.clear(); location.href='/' });

async function load(){
  const d = await apiFetch('/api/devices/' + encodeURIComponent(deviceId), { method:'GET' });
  const el = document.getElementById('deviceInfo');
  if (!d.ok) { el.textContent = 'Erro: ' + (d.error || ''); return; }
  const x = d.device;
  el.innerHTML = `
    <strong>DeviceId:</strong> ${x.deviceId}<br>
    <strong>IMEI:</strong> ${x.imei || '-'}<br>
    <strong>Modelo:</strong> ${x.model || '-'}<br>
    <strong>Online:</strong> ${x.isOnline ? 'Sim' : 'Não'}<br>
    <strong>Última vez online:</strong> ${x.lastOnlineAt ? new Date(x.lastOnlineAt).toLocaleString() : '-'}<br>
    <strong>Bateria:</strong> ${x.batteryLevel ?? '-'}<br>
    <strong>Rede:</strong> ${x.networkType || '-'} / ${x.carrier || '-'}<br>
    <strong>Sinal:</strong> ${x.signalLevel ?? '-'}<br>
    <strong>Subscrição:</strong> ${x.subscriptionStatus} até ${x.subscriptionUntil ? new Date(x.subscriptionUntil).toLocaleString() : '-'}
  `;

  const h = await apiFetch('/api/telemetry/' + encodeURIComponent(deviceId) + '/history', { method:'GET' });
  const history = document.getElementById('history');
  if (!h.ok) {
    history.textContent = h.error === 'subscription_required'
      ? 'Subscrição inativa. Faça o pagamento mensal de 800 MZN para liberar os dados.'
      : 'Erro ao carregar histórico';
    return;
  }
  history.textContent = JSON.stringify(h.items.slice(0, 10), null, 2);
}
load();
</script>
</body>
</html>
