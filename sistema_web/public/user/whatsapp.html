<!doctype html>
<html>
<head><meta charset="utf-8"/><title>WhatsApp</title><link rel="stylesheet" href="/css/styles.css"></head>
<body>
  <div class="container">
    <header style="display:flex;justify-content:space-between"><h1>WhatsApp</h1><div><a href="/user/dashboard.html">Voltar</a> <button id="logout">Logout</button></div></header>
    <div class="card"><label>Dispositivo: <select id="deviceSelect"><option value="">Selecione</option></select></label> <label>DeviceId: <input id="deviceId" /></label><button id="btnLoad">Carregar</button></div>
    <div class="card"><p class="small">Esta vista mostra mensagens/notificações do WhatsApp capturadas pelo Notification Listener. Ative o acesso às notificações no Android para manter a sincronização.</p><ul id="list" style="list-style:none;padding-left:0"></ul></div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    if (!localStorage.getItem('auth_token')) location.href = '/';
    document.getElementById('logout').addEventListener('click', ()=>{ localStorage.clear(); location.href='/' });

    const params = new URLSearchParams(window.location.search);
    if (params.get('deviceId')) document.getElementById('deviceId').value = params.get('deviceId');

    async function loadDeviceOptions(){
      const res = await apiFetch('/api/devices/my', { method:'GET' });
      if (!res.ok) return;
      const sel = document.getElementById('deviceSelect');
      sel.innerHTML = '<option value="">Selecione</option>';
      (res.devices || []).forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.textContent = (d.model || d.name || d.deviceId) + (d.model || d.name ? ` (${d.deviceId})` : '');
        if (d.deviceId === document.getElementById('deviceId').value) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => document.getElementById('deviceId').value = sel.value);
    }

    document.getElementById('btnLoad').addEventListener('click', async () => {
      const deviceId = document.getElementById('deviceId').value.trim();
      if (!deviceId) return alert('DeviceId required');
      const r = await apiFetch('/api/telemetry/' + encodeURIComponent(deviceId) + '/items?type=whatsapp', { method:'GET' });
      const ul = document.getElementById('list'); ul.innerHTML = '';
      if (!r.ok) { ul.innerHTML = '<li>Erro: ' + JSON.stringify(r) + '</li>'; return; }
      if (!(r.items || []).length) {
        ul.innerHTML = '<li>Sem mensagens WhatsApp persistidas.</li>';
        return;
      }
      r.items.forEach(it => {
        const ts = new Date(it.ts).toLocaleString();
        const p = it.payload || it;
        const from = p.payload && p.payload.from ? p.payload.from : (p.from || '');
        const body = p.payload && p.payload.body ? p.payload.body : (p.body || '');
        const packageName = p.payload && p.payload.package ? p.payload.package : (p.package || '');
        const li = document.createElement('li');
        li.innerHTML = `<div style="padding:8px;border-bottom:1px solid #eee"><small>${ts}</small><div><strong>Contacto:</strong> ${from || '—'}</div><div><strong>App:</strong> ${packageName || 'com.whatsapp'}</div><div>${body || '—'}</div></div>`;
        ul.appendChild(li);
      });
    });

    loadDeviceOptions().then(() => {
      if (document.getElementById('deviceId').value) document.getElementById('btnLoad').click();
    });
  </script>
</body>
</html>
