<!doctype html>
<html>
<head><meta charset="utf-8"/><title>Contactos</title><link rel="stylesheet" href="/css/styles.css"></head>
<body>
  <div class="container">
    <header style="display:flex;justify-content:space-between"><h1>Contactos</h1><div><a href="/user/dashboard.html">Voltar</a> <button id="logout">Logout</button></div></header>
    <div class="card">
      <label>Dispositivo:
        <select id="deviceSelect"><option value="">Selecione um dispositivo</option></select>
      </label>
      <input id="deviceId" placeholder="DeviceId" />
      <button id="btnLoad">Carregar</button>
    </div>
    <div class="card"><ul id="list" style="list-style:none;padding-left:0"></ul></div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    if (!localStorage.getItem('auth_token')) location.href = '/';
    document.getElementById('logout').addEventListener('click', ()=>{ localStorage.clear(); location.href='/' });

    const params = new URLSearchParams(window.location.search);
    if (params.get('deviceId')) document.getElementById('deviceId').value = params.get('deviceId');

    async function loadDeviceOptions(){
      const res = await apiFetch('/api/devices/my', { method:'GET' });
      const sel = document.getElementById('deviceSelect');
      if (!res.ok) return;
      sel.innerHTML = '<option value="">Selecione um dispositivo</option>';
      (res.devices || []).forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.textContent = (d.model || d.name || d.deviceId) + (d.model || d.name ? ` (${d.deviceId})` : '');
        if (d.deviceId === document.getElementById('deviceId').value) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => {
        document.getElementById('deviceId').value = sel.value;
      });
    }

    document.getElementById('btnLoad').addEventListener('click', async () => {
      const deviceId = document.getElementById('deviceId').value.trim();
      if (!deviceId) return alert('DeviceId required');
      const r = await apiFetch('/api/devices/' + encodeURIComponent(deviceId) + '/contacts', { method:'GET' });
      const ul = document.getElementById('list'); ul.innerHTML = '';
      if (!r.ok) { ul.innerHTML = '<li>Erro: ' + JSON.stringify(r) + '</li>'; return; }
      (r.contacts || []).forEach(contact => {
        const li = document.createElement('li');
        li.innerHTML = `<div style="padding:8px;border-bottom:1px solid #eee"><div><strong>${contact.display_name || 'Sem nome'}</strong></div><div>${contact.phone_number || '-'}</div><div>${contact.email || ''}</div><small>${contact.updated_at ? new Date(contact.updated_at).toLocaleString() : ''}</small></div>`;
        ul.appendChild(li);
      });
    });

    loadDeviceOptions().then(() => {
      if (document.getElementById('deviceId').value) document.getElementById('btnLoad').click();
    });
  </script>
</body>
</html>
