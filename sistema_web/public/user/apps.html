<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Apps instaladas e uso</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <header style="display:flex;justify-content:space-between">
      <h1>Apps instaladas e uso</h1>
      <div><a href="/user/dashboard.html">Voltar</a> <button id="logout">Logout</button></div>
    </header>

    <div class="card">
      <label>Dispositivo:
        <select id="deviceSelect"><option value="">Selecione um dispositivo</option></select>
      </label>
      <input id="deviceId" placeholder="DeviceId" />
      <button id="btnLoad">Carregar</button>
    </div>

    <div class="card">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
        <input id="searchApp" placeholder="Filtrar app/package" />
        <select id="filterType">
          <option value="all">Todos</option>
          <option value="user">Utilizador</option>
          <option value="system">Sistema</option>
        </select>
      </div>
      <div id="appsChart" class="small" style="display:grid;gap:8px;margin-bottom:16px"></div>
      <div class="table-wrap">
        <table id="appsTable">
          <thead>
            <tr>
              <th>App</th>
              <th>Package</th>
              <th>Tipo</th>
              <th>Último uso</th>
              <th>Tempo em foreground</th>
              <th>Instalada em</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (!localStorage.getItem('auth_token')) location.href = '/';
    document.getElementById('logout').addEventListener('click', ()=>{ localStorage.clear(); location.href='/' });

    const params = new URLSearchParams(window.location.search);
    if (params.get('deviceId')) document.getElementById('deviceId').value = params.get('deviceId');

    function formatDuration(ms){
      const totalSeconds = Math.max(0, Math.round((ms || 0) / 1000));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      if (hours > 0) return `${hours}h ${minutes}m`;
      if (minutes > 0) return `${minutes}m ${seconds}s`;
      return `${seconds}s`;
    }
    let loadedApps = [];

    function renderChart(apps){
      const host = document.getElementById('appsChart');
      if (!apps.length) {
        host.innerHTML = '<div class="empty-state">Sem dados para o gráfico.</div>';
        return;
      }
      const top = [...apps].sort((a,b)=>(b.totalForegroundMs||0)-(a.totalForegroundMs||0)).slice(0,8);
      const max = Math.max(1, ...top.map(a => a.totalForegroundMs || 0));
      host.innerHTML = top.map(app => {
        const width = Math.max(4, Math.round(((app.totalForegroundMs || 0) / max) * 100));
        return `<div>
          <div style="display:flex;justify-content:space-between;gap:8px"><strong>${app.appName || app.packageName || 'App'}</strong><span>${formatDuration(app.totalForegroundMs)}</span></div>
          <div style="height:8px;background:#1e293b;border-radius:999px;overflow:hidden"><div style="height:8px;width:${width}%;background:#22c55e"></div></div>
        </div>`;
      }).join('');
    }

    function currentFilteredApps() {
      const q = document.getElementById('searchApp').value.trim().toLowerCase();
      const type = document.getElementById('filterType').value;
      return loadedApps.filter(app => {
        if (type === 'system' && !app.isSystemApp) return false;
        if (type === 'user' && app.isSystemApp) return false;
        if (!q) return true;
        const hay = ((app.appName || '') + ' ' + (app.packageName || '')).toLowerCase();
        return hay.includes(q);
      });
    }

    function renderAppsTable(apps){
      const tbody = document.querySelector('#appsTable tbody');
      tbody.innerHTML = '';
      if (!apps.length) {
        tbody.innerHTML = '<tr><td colspan="6">Sem dados de uso disponíveis para este filtro.</td></tr>';
        renderChart([]);
        return;
      }
      apps.forEach(app => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${app.appName || '—'}</td>
          <td>${app.packageName || '—'}</td>
          <td>${app.isSystemApp ? 'Sistema' : 'Utilizador'}</td>
          <td>${app.lastTimeUsedAt ? new Date(app.lastTimeUsedAt).toLocaleString() : 'Nunca/sem dados'}</td>
          <td>${formatDuration(app.totalForegroundMs)}</td>
          <td>${app.firstInstallTimeMs ? new Date(app.firstInstallTimeMs).toLocaleString() : '—'}</td>
        `;
        tbody.appendChild(tr);
      });
      renderChart(apps);
    }

    function refreshRenderedApps(){
      renderAppsTable(currentFilteredApps());
    }

    async function loadDeviceOptions(){
      const res = await apiFetch('/api/devices/my', { method:'GET' });
      const sel = document.getElementById('deviceSelect');
      if (!res.ok) return;
      sel.innerHTML = '<option value="">Selecione um dispositivo</option>';
      (res.devices || []).forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.textContent = (d.model || d.name || d.deviceId) + (d.model || d.name ? ` (${d.deviceId})` : '');
        if (d.deviceId === document.getElementById('deviceId').value) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => {
        document.getElementById('deviceId').value = sel.value;
      });
    }

    document.getElementById('btnLoad').addEventListener('click', async () => {
      const deviceId = document.getElementById('deviceId').value.trim();
      if (!deviceId) return alert('DeviceId required');
      const r = await apiFetch('/api/devices/' + encodeURIComponent(deviceId) + '/app-usage', { method:'GET' });
      const tbody = document.querySelector('#appsTable tbody');
      tbody.innerHTML = '';
      if (!r.ok) {
        tbody.innerHTML = '<tr><td colspan="6">Erro: ' + JSON.stringify(r) + '</td></tr>';
        return;
      }

      loadedApps = r.apps || [];
      refreshRenderedApps();
    });

    document.getElementById('searchApp').addEventListener('input', refreshRenderedApps);
    document.getElementById('filterType').addEventListener('change', refreshRenderedApps);

    loadDeviceOptions().then(() => {
      if (document.getElementById('deviceId').value) document.getElementById('btnLoad').click();
    });
  </script>
</body>
</html>
