<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>DeviceMgr - Registo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container auth-shell">
    <div class="card auth-card">
      <h1>Criar conta</h1>
      <p class="small">Registo de utilizador.</p>
      <input id="r_email" type="email" placeholder="Email" />
      <input id="r_name" placeholder="Nome" />
      <input id="r_password" type="password" placeholder="Password" />
      <button id="btnRegister">Registar</button>
      <p id="regMsg" class="small"></p>
      <p class="small">Já tens conta? <a href="/login.html">Clica aqui para entrar</a></p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('btnRegister').addEventListener('click', async () => {
      const email = document.getElementById('r_email').value;
      const name = document.getElementById('r_name').value;
      const password = document.getElementById('r_password').value;
      const res = await apiFetch('/api/auth/register', { method:'POST', body: { email, name, password } });
      if (res.ok) {
        document.getElementById('regMsg').innerText = 'Registo concluído. Faça login.';
      } else {
        document.getElementById('regMsg').innerText = 'Erro: ' + (res.error || JSON.stringify(res));
      }
    });
  </script>
</body>
</html>
