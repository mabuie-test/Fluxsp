<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>DeviceMgr - Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
  <div class="container auth-shell">
    <div class="card auth-card">
      <h1><i class="fa-solid fa-shield-halved"></i> Device Manager</h1>
      <p class="small">Acesso seguro ao painel.</p>
      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <button id="btnLogin"><i class="fa-solid fa-right-to-bracket"></i> Entrar</button>
      <p id="loginMsg" class="small"></p>
      <p class="small">Não tens conta? <a href="/register.html">Clica aqui para registar</a></p>
      <p class="small"><a href="/forgot-password.html">Esqueci minha senha</a></p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('btnLogin').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await apiFetch('/api/auth/login', { method:'POST', body: { email, password } });
      if (res.token) {
        localStorage.setItem('auth_token', res.token);
        localStorage.setItem('role', res.role);
        if (res.role === 'admin') location.href = '/admin/index.html';
        else location.href = '/user/dashboard.html';
      } else {
        document.getElementById('loginMsg').innerText = 'Erro: ' + (res.error || JSON.stringify(res));
      }
    });
  </script>
</body>
</html>
