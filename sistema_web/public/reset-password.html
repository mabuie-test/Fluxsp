<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>DeviceMgr - Nova senha</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container auth-shell">
    <div class="card auth-card">
      <h1>Definir nova senha</h1>
      <p class="small">Digite sua nova senha.</p>
      <input id="password" type="password" placeholder="Nova password" />
      <button id="btnReset">Atualizar senha</button>
      <p id="msg" class="small"></p>
      <p class="small"><a href="/login.html">Voltar para login</a></p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('btnReset').addEventListener('click', async () => {
      const token = new URLSearchParams(location.search).get('token') || '';
      const password = document.getElementById('password').value;
      const res = await apiFetch('/api/auth/reset-password', { method:'POST', body:{token, password} });
      document.getElementById('msg').innerText = res.ok ? 'Senha atualizada com sucesso.' : ('Erro: ' + (res.error || 'falha'));
    });
  </script>
</body>
</html>
